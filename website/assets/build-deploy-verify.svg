<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Build deploy verify flow screenshot</title>
  <desc id="desc">A screenshot-style diagram showing local build, host deploy, and deployed verification.</desc>
  <rect width="1200" height="620" fill="#f7f8fb"/>
  <rect x="54" y="48" width="1092" height="524" rx="18" fill="#ffffff" stroke="#d7dce8"/>
  <text x="86" y="104" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">Build -> Deploy -> Verify</text>
  <text x="86" y="136" font-family="Inter, Arial, sans-serif" font-size="16" fill="#62708a">The repository builds a secret-free bundle. The host renders secrets and proves the runtime.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="86" y="194" width="292" height="242" rx="14" fill="#fbfcff" stroke="#cfd6e6"/>
    <text x="118" y="236" font-size="21" font-weight="700" fill="#172033">1. Local build</text>
    <text x="118" y="274" font-size="15" fill="#526078">./build.sh --manifest site.json</text>
    <text x="118" y="306" font-size="15" fill="#526078">TypeScript, Kotlin, Bazel</text>
    <text x="118" y="338" font-size="15" fill="#526078">Component lock</text>
    <text x="118" y="370" font-size="15" fill="#526078">Secret-free dist/ bundle</text>
    <rect x="118" y="394" width="126" height="26" rx="13" fill="#edf7ed"/>
    <text x="136" y="413" font-size="13" fill="#2a6d3f">No decrypt</text>

    <rect x="454" y="194" width="292" height="242" rx="14" fill="#fbfcff" stroke="#cfd6e6"/>
    <text x="486" y="236" font-size="21" font-weight="700" fill="#172033">2. Host deploy</text>
    <text x="486" y="274" font-size="15" fill="#526078">rsync dist/ to ~/webservices</text>
    <text x="486" y="306" font-size="15" fill="#526078">./deploy.sh</text>
    <text x="486" y="338" font-size="15" fill="#526078">SOPS renders runtime config</text>
    <text x="486" y="370" font-size="15" fill="#526078">systemd starts Compose shards</text>
    <rect x="486" y="394" width="170" height="26" rx="13" fill="#fff4df"/>
    <text x="504" y="413" font-size="13" fill="#8a5b00">Secrets stay on host</text>

    <rect x="822" y="194" width="292" height="242" rx="14" fill="#fbfcff" stroke="#cfd6e6"/>
    <text x="854" y="236" font-size="21" font-weight="700" fill="#172033">3. Verification</text>
    <text x="854" y="274" font-size="15" fill="#526078">./verify.sh</text>
    <text x="854" y="306" font-size="15" fill="#526078">Readiness gate</text>
    <text x="854" y="338" font-size="15" fill="#526078">Stack contract</text>
    <text x="854" y="370" font-size="15" fill="#526078">Browser/auth/route checks</text>
    <rect x="854" y="394" width="124" height="26" rx="13" fill="#e8f3ff"/>
    <text x="872" y="413" font-size="13" fill="#2463a6">Proof, not hope</text>
  </g>

  <path d="M390 315h52" stroke="#9aa7bd" stroke-width="3"/>
  <path d="M442 315l-12-8v16z" fill="#9aa7bd"/>
  <path d="M758 315h52" stroke="#9aa7bd" stroke-width="3"/>
  <path d="M810 315l-12-8v16z" fill="#9aa7bd"/>

  <rect x="86" y="480" width="1028" height="54" rx="10" fill="#172033"/>
  <text x="116" y="514" font-family="SFMono-Regular, Consolas, monospace" font-size="17" fill="#dbeafe">$ rsync ./dist/ host:~/webservices/ &amp;&amp; ssh host 'cd ~/webservices &amp;&amp; ./deploy.sh &amp;&amp; ./verify.sh'</text>
</svg>
