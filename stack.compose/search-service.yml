services:
  search-service:
    image: webservices/search-service:local-build
    build:
      context: .
      dockerfile: ./stack.containers/search-service/Dockerfile
    container_name: search-service
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - qdrant
      - postgres
      - ai
    depends_on:
      qdrant:
        condition: service_healthy
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
      embedding-gpu:
        condition: service_started
    environment:
      SEARCH_SERVICE_PORT: 8098
      SEARCH_SERVICE_INTERNAL_TOKEN: ${SEARCH_SERVICE_INTERNAL_TOKEN:?SEARCH_SERVICE_INTERNAL_TOKEN is required}
      QDRANT_URL: qdrant:6334
      QDRANT_HTTP_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_ADMIN_API_KEY}
      GRAFANA_PUBLIC_URL: https://grafana.${DOMAIN}
      SEARCH_PRESENTATION_METADATA_COLLECTIONS: market_data,test-market
      SEARCH_POSTGRES_STATEMENT_TIMEOUT_SECONDS: "30"
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres-ssd:5432/webservices
      POSTGRES_USER: ${POSTGRES_SEARCH_SERVICE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SEARCH_SERVICE_PASSWORD}
      EMBEDDING_SERVICE_URL: http://embedding-gpu:8080
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --tries=1 --timeout=3 -O- http://127.0.0.1:8098/health | grep -q ok
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
