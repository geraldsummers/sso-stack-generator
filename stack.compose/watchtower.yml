services:
  watchtower:
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: watchtower
    restart: unless-stopped
    networks:
      - docker-host-lifecycle
      - internet
      - caddy
      - monitoring
    depends_on:
      docker-socket-lifecycle-proxy:
        condition: service_healthy
      prometheus:
        condition: service_started
      ntfy:
        condition: service_started
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_INCLUDE_RESTARTING: true
      WATCHTOWER_LABEL_ENABLE: true
      WATCHTOWER_MONITOR_ONLY: ${WATCHTOWER_MONITOR_ONLY:-true}
      WATCHTOWER_SCOPE: webservices
      WATCHTOWER_SCHEDULE: 0 0 4 * * *
      DOCKER_API_VERSION: 1.44
      WATCHTOWER_NOTIFICATIONS: shoutrrr
      # Using ntfy scheme with insecure flag since ntfy uses HTTP:80 internally
      WATCHTOWER_HTTP_API_METRICS: ${WATCHTOWER_HTTP_API_METRICS:-false}
      TZ: Australia/Sydney
      DOCKER_HOST: tcp://docker-socket-lifecycle-proxy:2375

networks:
  docker-host-lifecycle:
    external: true
    name: webservices_docker-host-lifecycle
  internet:
    external: true
    name: webservices_internet
  caddy:
    external: true
    name: webservices_caddy
  monitoring:
    external: true
    name: webservices_monitoring
