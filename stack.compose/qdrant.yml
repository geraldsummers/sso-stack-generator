services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: qdrant
    restart: unless-stopped
    networks:
      - qdrant
    depends_on:
      volume-init:
        condition: service_completed_successfully
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage
      - ./configs/qdrant/config.yaml:/qdrant/config/config.yaml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          test -d /qdrant/storage && \
          timeout 2 bash -c '</dev/tcp/localhost/6333' && \
          timeout 2 bash -c '</dev/tcp/localhost/6334'
      interval: 5s
      timeout: 4s
      retries: 50
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
