services:
  onlyoffice:
    image: onlyoffice/documentserver:8.3.3
    container_name: onlyoffice
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -lc
      - |
        # Install the caddy CA into the container trust store so callback/storage
        # TLS handshakes to seafile.${DOMAIN} are trusted by all runtime components.
        if [ -s /ca/caddy-ca.crt ]; then
          cp /ca/caddy-ca.crt /usr/local/share/ca-certificates/caddy-ca.crt
          update-ca-certificates
        fi
        exec /app/ds/run-document-server.sh
    networks:
      caddy:
    depends_on:
      caddy:
        condition: service_healthy
    environment:
      JWT_ENABLED: true
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      JWT_HEADER: AuthorizationJwt
      JWT_IN_BODY: true
      NODE_EXTRA_CA_CERTS: /ca/caddy-ca.crt
      SSL_CERT_FILE: /ca/caddy-ca.crt
      CURL_CA_BUNDLE: /ca/caddy-ca.crt
    volumes:
      - onlyoffice_data:/var/www/onlyoffice
      - caddy_ca:/ca:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
