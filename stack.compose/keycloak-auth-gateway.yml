services:
  keycloak-configure:
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: keycloak-configure
    restart: "no"
    networks:
      - caddy
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      KEYCLOAK_REALM: webservices
      KEYCLOAK_SERVER: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-}
      BOOKSTACK_OAUTH_SECRET: ${BOOKSTACK_OAUTH_SECRET:-}
      SOGO_OAUTH_SECRET: ${SOGO_OAUTH_SECRET:-}
      JELLYFIN_OIDC_SECRET: ${JELLYFIN_OIDC_SECRET:-}
      DONETICK_OAUTH_SECRET: ${DONETICK_OAUTH_SECRET:-}
      ERPNEXT_OAUTH_SECRET: ${ERPNEXT_OAUTH_SECRET:-}
      FORGEJO_OAUTH_SECRET: ${FORGEJO_OAUTH_SECRET:-}
      MASTODON_OAUTH_SECRET: ${MASTODON_OAUTH_SECRET:-}
      MATRIX_OAUTH_SECRET: ${MATRIX_OAUTH_SECRET:-}
      MATRIX_AUTHENTICATION_SERVICE_OAUTH_SECRET: ${MATRIX_AUTHENTICATION_SERVICE_OAUTH_SECRET:-}
      MATRIX_AUTHENTICATION_SERVICE_UPSTREAM_PROVIDER_ID: ${MATRIX_AUTHENTICATION_SERVICE_UPSTREAM_PROVIDER_ID:-01JY9K7VKQ23V93TP9FB9VYQVM}
      PLANKA_OAUTH_SECRET: ${PLANKA_OAUTH_SECRET:-}
      VAULTWARDEN_OAUTH_SECRET: ${VAULTWARDEN_OAUTH_SECRET:-}
    volumes:
      - ./configs/keycloak/configure-runtime.sh:/configure-runtime.sh:ro
    entrypoint: ["/bin/bash", "/configure-runtime.sh"]

  keycloak-auth-gateway:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
    container_name: keycloak-auth-gateway
    restart: unless-stopped
    command:
      - --provider-ca-file=/ca/caddy-ca.crt
      - --use-system-trust-store=true
    networks:
      - caddy
      - valkey
    depends_on:
      keycloak-configure:
        condition: service_completed_successfully
      caddy:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://keycloak.${DOMAIN}/realms/webservices
      OAUTH2_PROXY_CLIENT_ID: webservices-edge
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-}
      OAUTH2_PROXY_USER_ID_CLAIM: preferred_username
      OAUTH2_PROXY_COOKIE_NAME: _webservices_edge
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-}
      OAUTH2_PROXY_COOKIE_DOMAINS: ${DOMAIN},.${DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${DOMAIN},.${DOMAIN}
      OAUTH2_PROXY_SESSION_STORE_TYPE: redis
      OAUTH2_PROXY_REDIS_CONNECTION_URL: redis://default:${VALKEY_ADMIN_PASSWORD}@valkey:6379/2
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_REDIRECT_URL: https://keycloak-auth.${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_SCOPE: "openid profile email groups"
      OAUTH2_PROXY_UPSTREAMS: "static://202"
    volumes:
      - caddy_ca:/ca:ro
