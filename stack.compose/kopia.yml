services:
  kopia:
    image: kopia/kopia:0.22.3
    container_name: kopia
    restart: unless-stopped
    networks:
      caddy:
      internet:
    depends_on:
      caddy:
        condition: service_started
    environment:
      KOPIA_REPO_PATH: /app/repository
      KOPIA_PASSWORD: ${KOPIA_PASSWORD}
      KOPIA_SERVER_USERNAME: ${KOPIA_SERVER_USERNAME:-kopia}
      KOPIA_SERVER_PASSWORD: ${KOPIA_PASSWORD}
      USER: kopia
    volumes:
      - kopia_data:/app
      - postgres_data:/backup/postgres:ro
      - mariadb_data:/backup/mariadb:ro
      - ./configs/kopia/init-kopia.sh:/init-kopia.sh:ro
    entrypoint:
      - sh
      - /init-kopia.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u \"$${KOPIA_SERVER_USERNAME:-kopia}:$${KOPIA_SERVER_PASSWORD:-$${KOPIA_PASSWORD}}\" http://localhost:51515/ >/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
