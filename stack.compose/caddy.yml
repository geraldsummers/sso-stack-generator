services:
  caddy:
    image: caddy:2.11.3@sha256:ec18ee54aab3315c22e25f3b2babda73ff8007d39b13b3bd1bfffa2f0444c7d9
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${WORKSPACE_RUNTIME_PUBLIC_HOST}:${WORKSPACE_RUNTIME_PUBLIC_ADDRESS}"
    networks:
      caddy:
        aliases:
          - www.${DOMAIN}
          - grafana.${DOMAIN}
          - alerts.${DOMAIN}
          - vaultwarden.${DOMAIN}
          - planka.${DOMAIN}
          - bookstack.${DOMAIN}
          - sogo.${DOMAIN}
          - jellyfin.${DOMAIN}
          - donetick.${DOMAIN}
          - erpnext.${DOMAIN}
          - jupyterhub.${DOMAIN}
          - homepage.${DOMAIN}
          - seafile.${DOMAIN}
          - api.seafile.${DOMAIN}
          - api.files.${DOMAIN}
          - onlyoffice.${DOMAIN}
          - pipeline.${DOMAIN}
          - chatgpt-connector.${DOMAIN}
          - models.${DOMAIN}
          - matrix.${DOMAIN}
          - matrix-auth.${DOMAIN}
          - api.matrix.${DOMAIN}
          - matrix-rtc.${DOMAIN}
          - element.${DOMAIN}
          - api.element.${DOMAIN}
          - api.chat.${DOMAIN}
          - homeassistant.${DOMAIN}
          - direct.homeassistant.${DOMAIN}
          - api.homeassistant.${DOMAIN}
          - keycloak.${DOMAIN}
          - keycloak-auth.${DOMAIN}
          - keycloak-whoami.${DOMAIN}
          - onboarding.${DOMAIN}
          - kopia.${DOMAIN}
          - mail.${DOMAIN}
          - forgejo.${DOMAIN}
          - workspaces.${DOMAIN}
          - api.vaultwarden.${DOMAIN}
          - api.pass.${DOMAIN}
          - api.mastodon.${DOMAIN}
          - api.social.${DOMAIN}
      postgres:
      mariadb:
      qdrant:
      ai:
        aliases:
          - ${DOMAIN}
          - www.${DOMAIN}
          - keycloak.${DOMAIN}
          - keycloak-auth.${DOMAIN}
          - keycloak-whoami.${DOMAIN}
          - onboarding.${DOMAIN}
          - grafana.${DOMAIN}
          - jupyterhub.${DOMAIN}
          - vaultwarden.${DOMAIN}
          - api.vaultwarden.${DOMAIN}
          - api.pass.${DOMAIN}
          - prometheus.${DOMAIN}
          - alerts.${DOMAIN}
          - homepage.${DOMAIN}
          - ntfy.${DOMAIN}
          - mastodon.${DOMAIN}
          - api.mastodon.${DOMAIN}
          - api.social.${DOMAIN}
          - forgejo.${DOMAIN}
          - bookstack.${DOMAIN}
          - sogo.${DOMAIN}
          - jellyfin.${DOMAIN}
          - donetick.${DOMAIN}
          - erpnext.${DOMAIN}
          - api.bookstack.${DOMAIN}
          - planka.${DOMAIN}
          - kopia.${DOMAIN}
          - homeassistant.${DOMAIN}
          - direct.homeassistant.${DOMAIN}
          - api.homeassistant.${DOMAIN}
          - api.home.${DOMAIN}
          - mail.${DOMAIN}
          - element.${DOMAIN}
          - api.element.${DOMAIN}
          - api.chat.${DOMAIN}
          - matrix.${DOMAIN}
          - matrix-auth.${DOMAIN}
          - api.matrix.${DOMAIN}
          - matrix-rtc.${DOMAIN}
          - search.${DOMAIN}
          - chatgpt-connector.${DOMAIN}
          - pipeline.${DOMAIN}
          - models.${DOMAIN}
          - seafile.${DOMAIN}
          - api.seafile.${DOMAIN}
          - api.files.${DOMAIN}
          - onlyoffice.${DOMAIN}
          - workspaces.${DOMAIN}
      mailserver:
      memcached:
      matrix-internal:
      mastodon-internal:
      monitoring:
    environment:
      DOMAIN: ${DOMAIN}
      STACK_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      WORKSPACE_PROXY_AUTH_SECRET: ${WORKSPACE_PROXY_AUTH_SECRET}
      OPENSEARCH_BASIC_AUTH: ${OPENSEARCH_BASIC_AUTH}
      BOOKSTACK_INTERNAL_API_TOKEN: ${BOOKSTACK_INTERNAL_API_TOKEN}
      HOMEASSISTANT_TRUSTED_PROXY_SECRET: ${HOMEASSISTANT_TRUSTED_PROXY_SECRET}
      ONBOARDING_TRUSTED_PROXY_SECRET: ${ONBOARDING_TRUSTED_PROXY_SECRET}
      CHATGPT_CONNECTOR_TRUSTED_PROXY_SECRET: ${CHATGPT_CONNECTOR_TRUSTED_PROXY_SECRET}
      WORKSPACE_RUNTIME_PUBLIC_HOST: ${WORKSPACE_RUNTIME_PUBLIC_HOST}
      KOPIA_PROXY_AUTHORIZATION: ${KOPIA_PROXY_AUTHORIZATION}
      VAULTWARDEN_ORG_IDENTIFIER: ${VAULTWARDEN_ORG_IDENTIFIER}
      VAULTWARDEN_ORG_ID: ${VAULTWARDEN_ORG_ID}
      MATRIX_AUTHENTICATION_SERVICE_ACTIVE: ${MATRIX_AUTHENTICATION_SERVICE_ACTIVE:-false}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_certs:/certs
      - caddy_ca:/ca
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./configs/vaultwarden/index.html:/srv/vaultwarden/index.html:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        BUNDLE_SRC="/etc/ssl/certs/ca-certificates.crt"
        if [ ! -f "$$BUNDLE_SRC" ]; then
          BUNDLE_SRC="/etc/ssl/cert.pem"
        fi

        if [ -f "$$BUNDLE_SRC" ]; then
          cp "$$BUNDLE_SRC" /ca/caddy-ca.crt
        else
          touch /ca/caddy-ca.crt
        fi
        chmod 644 /ca/caddy-ca.crt

        rm -f /data/caddy/locks/*.lock 2>/dev/null || true
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile &
        caddy_pid=$$!

        trap 'kill -TERM "$$caddy_pid" 2>/dev/null || true; wait "$$caddy_pid"' INT TERM

        for _ in $$(seq 1 20); do
          if [ -f /certs/pki/authorities/local/root.crt ]; then
            cat /certs/pki/authorities/local/root.crt >> /ca/caddy-ca.crt
            echo "" >> /ca/caddy-ca.crt
            chmod 644 /ca/caddy-ca.crt
            echo "Appended Caddy local CA to /ca/caddy-ca.crt"
            break
          fi
          sleep 1
        done

        wait "$$caddy_pid"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          test -s /ca/caddy-ca.crt && \
          wget --quiet --tries=1 --spider --timeout=5 http://127.0.0.1:2019/config/ && \
          wget --quiet --tries=1 --spider --timeout=5 http://127.0.0.1:2019/reverse_proxy/upstreams && \
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 | grep -q "Valid configuration"
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 45s
