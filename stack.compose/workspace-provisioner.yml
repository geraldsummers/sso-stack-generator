services:
  workspace-provisioner:
    image: webservices/workspace-provisioner:local-build
    build:
      context: .
      dockerfile: ./stack.containers/workspace-provisioner/Dockerfile
    container_name: workspace-provisioner
    restart: unless-stopped
    networks:
      - caddy
      - docker-controller
      - ai
    depends_on:
      docker-vm-controller-proxy:
        condition: service_started
      search-service:
        condition: service_started
    environment:
      WORKSPACE_PROVISIONER_PORT: 8120
      WORKSPACE_PROVISIONER_DATA_DIR: /data
      WORKSPACE_PROVISIONER_DB_PATH: /data/db/workspaces.sqlite
      WORKSPACE_PROVISIONER_OIDC_BASE_URL: http://keycloak:8080/realms/webservices
      WORKSPACE_PROVISIONER_OIDC_PUBLIC_URL: https://keycloak.${DOMAIN}/realms/webservices
      WORKSPACE_PROVISIONER_PUBLIC_BASE_URL: https://workspaces.${DOMAIN}
      WORKSPACE_PROVISIONER_SEARCH_SERVICE_BASE_URL: http://search-service:8098
      WORKSPACE_PROVISIONER_TRUSTED_PROXY_SECRET: ${MODEL_CONTEXT_PROXY_AUTH_SECRET:?MODEL_CONTEXT_PROXY_AUTH_SECRET is required}
      WORKSPACE_PROVISIONER_AGENT_TOKEN_SECRET: ${MODEL_CONTEXT_PROXY_AUTH_SECRET:?MODEL_CONTEXT_PROXY_AUTH_SECRET is required}
      WORKSPACE_PROVISIONER_AGENT_TOKEN_TTL_SECONDS: ${WORKSPACE_AGENT_TOKEN_TTL_SECONDS:-86400}
      WORKSPACE_PROVISIONER_RUNTIME_PUBLIC_HOST: ${WORKSPACE_RUNTIME_PUBLIC_HOST}
      WORKSPACE_PROVISIONER_RUNTIME_SSH_PORT_START: ${WORKSPACE_RUNTIME_SSH_PORT_START:-47000}
      WORKSPACE_PROVISIONER_RUNTIME_SSH_PORT_END: ${WORKSPACE_RUNTIME_SSH_PORT_END:-47999}
      WORKSPACE_PROVISIONER_RUNTIME_NOTEBOOK_PORT_START: ${WORKSPACE_RUNTIME_NOTEBOOK_PORT_START:-48000}
      WORKSPACE_PROVISIONER_RUNTIME_NOTEBOOK_PORT_END: ${WORKSPACE_RUNTIME_NOTEBOOK_PORT_END:-48999}
      WORKSPACE_PROVISIONER_RUNTIME_TTYD_PORT_START: ${WORKSPACE_RUNTIME_TTYD_PORT_START:-49000}
      WORKSPACE_PROVISIONER_RUNTIME_TTYD_PORT_END: ${WORKSPACE_RUNTIME_TTYD_PORT_END:-49999}
      WORKSPACE_PROVISIONER_WORKSPACE_IMAGE: webservices/agent-workspace:workspace-build
      WORKSPACE_PROVISIONER_WORKSPACE_CONTEXT: /workspace/stack.containers/agent-workspace
      WORKSPACE_PROVISIONER_NOTEBOOK_IMAGE: webservices/agent-workspace-notebook:workspace-build
      WORKSPACE_PROVISIONER_NOTEBOOK_CONTEXT: /workspace/stack.containers/agent-workspace-notebook
      WORKSPACE_PROVISIONER_WORKSPACE_USER: agent
      WORKSPACE_PROVISIONER_WORKSPACE_SSH_USER: agent
      WORKSPACE_PROVISIONER_WORKSPACE_SSH_PORT_INTERNAL: 2222
      WORKSPACE_PROVISIONER_WORKSPACE_NOTEBOOK_PORT_INTERNAL: 8888
      WORKSPACE_PROVISIONER_WORKSPACE_TTYD_PORT_INTERNAL: 7681
      WORKSPACE_PROVISIONER_WORKSPACE_CERT_TTL: ${WORKSPACE_CERT_TTL:-12h}
      WORKSPACE_PROVISIONER_WORKSPACE_LEASE_DAYS: ${WORKSPACE_LEASE_DAYS:-14}
      WORKSPACE_PROVISIONER_CA_NAME: webservices-workspaces
      WORKSPACE_PROVISIONER_CA_DNS_NAME: workspaces.${DOMAIN}
      WORKSPACE_PROVISIONER_CA_URL: https://workspaces.${DOMAIN}
      WORKSPACE_PROVISIONER_CA_PROVISIONER: workspace-provisioner
      DOCKER_HOST: tcp://docker-vm-controller-proxy:2375
    volumes:
      - workspace_provisioner_data:/data
      - ./stack.containers/agent-workspace:/workspace/stack.containers/agent-workspace:ro
      - ./stack.containers/agent-workspace-notebook:/workspace/stack.containers/agent-workspace-notebook:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --tries=1 --timeout=3 -O- http://127.0.0.1:8120/health | grep -q ok
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s

volumes:
  workspace_provisioner_data:
