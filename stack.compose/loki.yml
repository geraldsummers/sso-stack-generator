services:
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - loki_data:/loki
      - ./configs/loki/loki.yml:/etc/loki/loki.yml:ro
    command:
      - -config.file=/etc/loki/loki.yml
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
