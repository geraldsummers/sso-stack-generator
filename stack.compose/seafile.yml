services:
  seafile:
    image: seafileltd/seafile-mc:13.0.15
    container_name: seafile
    restart: unless-stopped
    labels:
      autoheal: "true"
    networks:
      caddy:
      mariadb:
      valkey:
    depends_on:
      volume-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      TZ: UTC
      DB_HOST: mariadb
      SEAFILE_MYSQL_DB_HOST: mariadb
      SEAFILE_MYSQL_DB_PORT: 3306
      SEAFILE_MYSQL_DB_USER: seafile
      SEAFILE_MYSQL_DB_PASSWORD: ${MARIADB_SEAFILE_PASSWORD}
      SEAFILE_MYSQL_DB_CCNET_DB_NAME: ccnet_db
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
      INIT_SEAFILE_MYSQL_ROOT_PASSWORD: ${MARIADB_ADMIN_PASSWORD}
      SEAFILE_SERVER_HOSTNAME: seafile.${DOMAIN}
      SEAFILE_SERVER_PROTOCOL: https
      INIT_SEAFILE_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      INIT_SEAFILE_ADMIN_PASSWORD: ${STACK_ADMIN_PASSWORD}
      JWT_PRIVATE_KEY: ${SEAFILE_JWT_KEY}
      TIME_ZONE: UTC
      SITE_ROOT: /
      # Using Valkey (Redis-compatible) for caching with authentication
      CACHE_PROVIDER: redis
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${VALKEY_ADMIN_PASSWORD}
      # Fix seafile-mc bug: explicitly set seahub database name
      # (otherwise it tries to use SQLite path '/opt/seafile/.../seahub.db' as MySQL DB name)
      SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: seahub_db
    entrypoint: ["/bin/bash", "/runtime-entrypoint.sh"]
    volumes:
      - seafile_files:/shared
      - seafile_media:/shared/seafile/seafile-data/storage
      - ./configs/seafile/seahub_settings.py:/seahub_settings_overlay.py:ro
      - ./configs/seafile/runtime-entrypoint.sh:/runtime-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 480s  # Seafile bootstrap, migrations, and app startup now happen in one container
