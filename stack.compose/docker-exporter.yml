services:
  docker-health-exporter:
    image: fviolence/docker-health-exporter@sha256:14116e61c73c868a6c244a6729dd0e1e556988d99d1b2c1475aaa968fcddaed7
    container_name: docker-health-exporter
    restart: unless-stopped
    networks:
      - monitoring
      - docker-proxy
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      TIMEOUT: 120
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9066/metrics', timeout=30)"]
      interval: 60s
      timeout: 35s
      retries: 5
      start_period: 120s
