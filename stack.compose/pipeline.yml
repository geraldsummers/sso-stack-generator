services:
  nats:
    image: nats:2.11.9-alpine
    container_name: nats
    restart: unless-stopped
    networks:
      - pipeline
    command:
      - --jetstream
      - --store_dir=/data/jetstream
      - --http_port=8222
      - --user=${NATS_USER}
      - --pass=${NATS_PASSWORD}
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --timeout=3 -O- http://127.0.0.1:8222/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  airflow-init:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow-init
    restart: "no"
    networks:
      - postgres
      - pipeline
    depends_on:
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
    environment: &airflow_env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_AIRFLOW_PASSWORD}@postgres-ssd:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${STACK_ADMIN_EMAIL}
      AIRFLOW_CONN_INGESTION_RUNNER: http://ingestion-runner:8090
    volumes: &airflow_volumes
      - ./configs/airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$$AIRFLOW_ADMIN_USERNAME" \
          --password "$$AIRFLOW_ADMIN_PASSWORD" \
          --firstname Stack \
          --lastname Admin \
          --role Admin \
          --email "$$AIRFLOW_ADMIN_EMAIL" || true

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow-webserver
    restart: unless-stopped
    networks:
      - caddy
      - postgres
      - pipeline
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      ingestion-runner:
        condition: service_started
    environment:
      <<: *airflow_env
    volumes: *airflow_volumes
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.11
    container_name: airflow-scheduler
    restart: unless-stopped
    networks:
      - postgres
      - pipeline
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      ingestion-runner:
        condition: service_started
    environment:
      <<: *airflow_env
    volumes: *airflow_volumes
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ingestion-runner:
    image: webservices/ingestion-runner:local-build
    build:
      context: .
      dockerfile: ./stack.containers/ingestion-runner/Dockerfile
    container_name: ingestion-runner
    restart: unless-stopped
    networks:
      - internet
      - postgres
      - qdrant
      - ai
      - pipeline
      - opensearch
      - mariadb
    depends_on:
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      embedding-gpu:
        condition: service_started
    environment:
      INGESTION_RUNNER_PORT: 8090
      POSTGRES_DSN: postgresql://pipeline_user:${POSTGRES_PIPELINE_PASSWORD}@postgres-ssd:5432/webservices
      NATS_URL: nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      NATS_STREAM_MAX_BYTES: ${NATS_STREAM_MAX_BYTES:-2147483648}
      QDRANT_HTTP_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_ADMIN_API_KEY}
      QDRANT_VECTOR_SIZE: ${VECTOR_EMBED_SIZE:-1024}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      EMBEDDING_SERVICE_URL: http://embedding-gpu:8080
      BOOKSTACK_URL: http://bookstack:80
      BOOKSTACK_PUBLIC_URL: https://bookstack.${DOMAIN}
      BOOKSTACK_API_TOKEN_ID: ${BOOKSTACK_API_TOKEN_ID}
      BOOKSTACK_API_TOKEN_SECRET: ${BOOKSTACK_API_TOKEN_SECRET}
      BOOKSTACK_ALLOWED_SOURCES: "rss,cve,wikipedia,australian_laws,linux_docs,debian_wiki,arch_wiki,agent_docs,stack_knowledge"
      STACK_KNOWLEDGE_PATH: /configs/stack-knowledge
      AGENT_DOCS_PATH: /configs/agent-docs
      RSS_FEED_URLS: "https://cointelegraph.com/rss,https://www.coindesk.com/arc/outboundfeeds/rss/,https://decrypt.co/feed,https://www.theblock.co/rss.xml,https://www.marketwatch.com/rss/topstories,https://feeds.reuters.com/reuters/businessNews,https://feeds.bbci.co.uk/news/business/rss.xml,https://rss.nytimes.com/services/xml/rss/nyt/Business.xml,https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml,https://hnrss.org/frontpage,https://feeds.arstechnica.com/arstechnica/index,https://www.investing.com/rss/news_25.rss,https://feeds.bbci.co.uk/news/world/rss.xml,https://www.abc.net.au/news/feed/51120/rss.xml"
      WIKIPEDIA_DUMP_PATH: "https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-pages-articles.xml.bz2"
      WIKIPEDIA_MAX_ARTICLES: "${WIKIPEDIA_MAX_ARTICLES:-2147483647}"
    volumes:
      - pipeline_data:/data
      - ./configs/stack-knowledge:/configs/stack-knowledge:ro
      - ./configs/agent-docs:/configs/agent-docs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
