services:
  knowledge-ingestion:
    image: webservices/knowledge-ingestion:local-build
    build:
      context: .
      dockerfile: ./stack.containers/knowledge-ingestion/Dockerfile
    container_name: knowledge-ingestion
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - postgres
      - internet
      - mariadb
    depends_on:
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
    environment:
      RSS_SCHEDULE_MINUTES: "60"
      RSS_FEED_URLS: "https://cointelegraph.com/rss,https://www.coindesk.com/arc/outboundfeeds/rss/,https://decrypt.co/feed,https://www.theblock.co/rss.xml,https://www.marketwatch.com/rss/topstories,https://feeds.reuters.com/reuters/businessNews,https://feeds.bbci.co.uk/news/business/rss.xml,https://rss.nytimes.com/services/xml/rss/nyt/Business.xml,https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml,https://hnrss.org/frontpage,https://feeds.arstechnica.com/arstechnica/index,https://www.investing.com/rss/news_25.rss,https://feeds.bbci.co.uk/news/world/rss.xml,https://www.abc.net.au/news/feed/51120/rss.xml"
      CVE_ENABLED: "true"
      CVE_API_KEY: "${CVE_API_KEY:-}"
      CVE_SCHEDULE_MINUTES: "1440"
      CVE_MAX_RESULTS: "2000"

      TORRENTS_DATA_PATH: "https://codeberg.org/heretic/torrents-csv-data/raw/branch/main/torrents.csv"
      TORRENTS_SCHEDULE_MINUTES: "10080"
      TORRENTS_MAX_RESULTS: "2147483647"

      WIKIPEDIA_DUMP_PATH: "https://dumps.wikimedia.org/enwiki/latest/enwiki-latest-pages-articles.xml.bz2"
      WIKIPEDIA_SCHEDULE_MINUTES: "43200"
      WIKIPEDIA_MAX_ARTICLES: "2147483647"

      AUSTRALIAN_LAWS_JURISDICTIONS: "commonwealth,nsw,vic,qld,wa,sa,tas,act,nt"
      AUSTRALIAN_LAWS_MAX_PER_JURISDICTION: "100"
      AUSTRALIAN_LAWS_START_YEAR: "2020"
      AUSTRALIAN_LAWS_SCHEDULE_MINUTES: "1440"

      LINUX_DOCS_SOURCES: "MAN_PAGES,DEBIAN_DOCS"
      LINUX_DOCS_SCHEDULE_MINUTES: "10080"
      LINUX_DOCS_MAX: "2147483647"

      OPEN_DOTA_ENABLED: "${OPEN_DOTA_ENABLED:-true}"
      OPEN_DOTA_BASE_URL: "${OPEN_DOTA_BASE_URL:-https://api.opendota.com/api}"
      OPEN_DOTA_SCHEDULE_MINUTES: "${OPEN_DOTA_SCHEDULE_MINUTES:-60}"
      OPEN_DOTA_MAX_MATCHES: "${OPEN_DOTA_MAX_MATCHES:-100}"
      OPEN_DOTA_FETCH_MATCH_DETAILS: "${OPEN_DOTA_FETCH_MATCH_DETAILS:-false}"

      POE_NINJA_ENABLED: "${POE_NINJA_ENABLED:-true}"
      POE_NINJA_BASE_URL: "${POE_NINJA_BASE_URL:-https://poe.ninja}"
      POE_NINJA_LEAGUES: "${POE_NINJA_LEAGUES:-Standard}"
      POE_NINJA_CURRENCY_TYPES: "${POE_NINJA_CURRENCY_TYPES:-Currency}"
      POE_NINJA_ITEM_TYPES: "${POE_NINJA_ITEM_TYPES:-UniqueWeapon,UniqueArmour,UniqueAccessory,UniqueFlask,UniqueJewel,SkillGem,DivinationCard,Map}"
      POE_NINJA_SCHEDULE_MINUTES: "${POE_NINJA_SCHEDULE_MINUTES:-360}"
      POE_NINJA_MAX_ENTRIES_PER_TYPE: "${POE_NINJA_MAX_ENTRIES_PER_TYPE:-1000}"
      POE_NINJA_REQUEST_DELAY_MS: "${POE_NINJA_REQUEST_DELAY_MS:-500}"

      STACK_KNOWLEDGE_ENABLED: "true"
      STACK_KNOWLEDGE_PATH: /configs/stack-knowledge
      STACK_KNOWLEDGE_SCHEDULE_MINUTES: "60"
      AGENT_DOCS_ENABLED: "true"
      AGENT_DOCS_PATH: /configs/agent-docs
      AGENT_DOCS_SCHEDULE_MINUTES: "60"

      WIKI_TYPES: "DEBIAN,ARCH"
      WIKI_MAX_PAGES_PER_WIKI: "500"
      WIKI_SCHEDULE_MINUTES: "10080"

      POSTGRES_JDBC_URL: jdbc:postgresql://postgres-ssd:5432/webservices
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}

      QDRANT_RSS_COLLECTION: rss_feeds
      QDRANT_CVE_COLLECTION: cve
      QDRANT_TORRENTS_COLLECTION: torrents
      QDRANT_MARKET_COLLECTION: market_data
      QDRANT_WIKIPEDIA_COLLECTION: wikipedia
      QDRANT_AUSTRALIAN_LAWS_COLLECTION: australian_laws
      QDRANT_LINUX_DOCS_COLLECTION: linux_docs
      QDRANT_OPEN_DOTA_COLLECTION: opendota_matches
      QDRANT_POE_NINJA_COLLECTION: poe_ninja_prices
      QDRANT_STACK_KNOWLEDGE_COLLECTION: stack_knowledge
      QDRANT_AGENT_DOCS_COLLECTION: agent_docs
      QDRANT_DEBIAN_WIKI_COLLECTION: debian_wiki
      QDRANT_ARCH_WIKI_COLLECTION: arch_wiki
      PIPELINE_METADATA_PATH: /data/metadata
      PIPELINE_DEDUP_PATH: /data/dedup/dedup.tsv
    volumes:
      - pipeline_data:/data
      - ./configs/stack-knowledge:/configs/stack-knowledge:ro
      - ./configs/agent-docs:/configs/agent-docs:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 wget --quiet --tries=1 -O /dev/null http://127.0.0.1:8090/health || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s

  embedding-worker:
    image: webservices/embedding-worker:local-build
    build:
      context: .
      dockerfile: ./stack.containers/embedding-worker/Dockerfile
    container_name: embedding-worker
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - qdrant
      - postgres
      - ai
    depends_on:
      qdrant:
        condition: service_started
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
      embedding-gpu:
        condition: service_started
    environment:
      EMBEDDING_SERVICE_URL: http://embedding-gpu:8080
      EMBEDDING_WORKER_BATCH_SIZE: "512"
      EMBEDDING_WORKER_POLL_INTERVAL_SECONDS: "1"
      EMBEDDING_WORKER_MAX_CONCURRENT: "64"
      EMBEDDING_WORKER_REQUEST_BATCH_SIZE: "64"
      EMBEDDING_WORKER_REQUEST_MAX_BYTES: "262144"
      EMBEDDING_WORKER_MAX_CONCURRENT_BATCHES: "8"
      EMBEDDING_WORKER_MAX_RETRIES: "3"
      EMBEDDING_WORKER_RESERVE_CPU_FOR_INTERACTIVE: "true"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_API_KEY: ${QDRANT_ADMIN_API_KEY}
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres-ssd:5432/webservices
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}

      QDRANT_RSS_COLLECTION: rss_feeds
      QDRANT_CVE_COLLECTION: cve
      QDRANT_TORRENTS_COLLECTION: torrents
      QDRANT_MARKET_COLLECTION: market_data
      QDRANT_WIKIPEDIA_COLLECTION: wikipedia
      QDRANT_AUSTRALIAN_LAWS_COLLECTION: australian_laws
      QDRANT_LINUX_DOCS_COLLECTION: linux_docs
      QDRANT_OPEN_DOTA_COLLECTION: opendota_matches
      QDRANT_POE_NINJA_COLLECTION: poe_ninja_prices
      QDRANT_STACK_KNOWLEDGE_COLLECTION: stack_knowledge
      QDRANT_AGENT_DOCS_COLLECTION: agent_docs
      QDRANT_DEBIAN_WIKI_COLLECTION: debian_wiki
      QDRANT_ARCH_WIKI_COLLECTION: arch_wiki

  content-publisher:
    image: webservices/content-publisher:local-build
    build:
      context: .
      dockerfile: ./stack.containers/content-publisher/Dockerfile
    container_name: content-publisher
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - qdrant
      - postgres
      - mariadb
      - internet
      - caddy
    depends_on:
      postgres-ssd-bootstrap:
        condition: service_completed_successfully
      bookstack:
        condition: service_healthy
    environment:
      BOOKSTACK_ENABLED: "true"
      BOOKSTACK_URL: "http://bookstack:80"
      BOOKSTACK_PUBLIC_URL: "https://bookstack.${DOMAIN}"
      BOOKSTACK_TOKEN_ID: ${BOOKSTACK_API_TOKEN_ID}
      BOOKSTACK_TOKEN_SECRET: ${BOOKSTACK_API_TOKEN_SECRET}
      BOOKSTACK_API_TOKEN_ID: ${BOOKSTACK_API_TOKEN_ID}
      BOOKSTACK_API_TOKEN_SECRET: ${BOOKSTACK_API_TOKEN_SECRET}
      BOOKSTACK_ALLOWED_SOURCES: "rss,cve,wikipedia,australian_laws,linux_docs,debian_wiki,arch_wiki,agent_docs"
      BOOKSTACK_MAX_CONCURRENT_WRITES: "1"

      POSTGRES_JDBC_URL: jdbc:postgresql://postgres-ssd:5432/webservices
      POSTGRES_USER: ${POSTGRES_PIPELINE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PIPELINE_PASSWORD}
      QDRANT_HTTP_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_ADMIN_API_KEY}
