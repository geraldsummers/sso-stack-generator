# ============================================================================
# Docker Socket Proxies - Secure Access to Docker Daemons
# ============================================================================
#
# Four proxy services:
#   1. docker-vm-socket-proxy: Read-only access to isolated Docker VM
#   2. docker-vm-controller-proxy: Mutating access to isolated Docker VM for controllers
#   3. docker-socket-proxy: Read-only access to host Docker daemon
#   4. docker-socket-controller-proxy: Mutating access to host Docker daemon for controllers
#
# ============================================================================
# docker-vm-socket-proxy - Isolated VM Docker Access
# ============================================================================
#
# Purpose: Provides secure, permission-controlled access to a Docker daemon
# running on an isolated VM (e.g., a separate physical machine for CI/CD,
# container builds, or security-sensitive workloads).
#
# Architecture:
#   1. isolated-docker-vm-tunnel: Establishes SSH tunnel to remote Docker host
#      - Connects via SSH to ISOLATED_DOCKER_VM_HOST (configured in stack.config.yaml)
#      - Forwards remote /var/run/docker.sock to local volume
#      - Requires SSH key authentication from a dedicated key directory
#      - Uses network_mode: host for direct network access
#
#   2. docker-vm-socket-proxy / docker-vm-controller-proxy: HAProxy-based
#      security layers with separate read-only and controller networks.
#
# Usage:
#   - Configure ISOLATED_DOCKER_VM_HOST in the external site bundle stack.config.yaml
#   - Format: user@ip_address
#   - Ensure SSH key-based auth is configured (~/.ssh/id_rsa or similar)
#   - Monitoring services connect via: DOCKER_HOST=tcp://docker-vm-socket-proxy:2375
#   - Controller services connect via: DOCKER_HOST=tcp://docker-vm-controller-proxy:2375
#
# ============================================================================
# docker-socket-proxy - Host Docker Access
# ============================================================================
#
# Purpose: Provides secure, permission-controlled access to the host Docker
# daemon for monitoring and management services (Watchtower, Dozzle, etc.)
#
# Architecture:
#   - Mounts host /var/run/docker.sock
#   - HAProxy-based security layers with restricted permissions
#   - Exposes filtered Docker API on tcp://docker-socket-proxy:2375
#   - Read-only access for monitoring services
#   - Exposes mutating API on tcp://docker-socket-controller-proxy:2375 only
#     on the docker-controller network
#
# Usage:
#   - Monitoring services connect via: DOCKER_HOST=tcp://docker-socket-proxy:2375
#   - Controller services connect via: DOCKER_HOST=tcp://docker-socket-controller-proxy:2375
#
# Security Notes:
#   - Only enable required permissions (see environment variables below)
#   - Never expose proxy ports to untrusted networks
#   - Use SSH key authentication for VM access (no passwords)
# ============================================================================

services:
  isolated-docker-vm-tunnel:
    image: webservices/isolated-docker-vm-tunnel:local-build
    build:
      context: .
      dockerfile: ./stack.containers/isolated-docker-vm-tunnel/Dockerfile
    pull_policy: build
    init: true
    # Keep the host private key 0600 by matching the default deploy UID/GID.
    user: "1000:1000"
    container_name: isolated-docker-vm-tunnel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    network_mode: host
    environment:
      ISOLATED_DOCKER_VM_HOST: ${ISOLATED_DOCKER_VM_HOST}
      ISOLATED_DOCKER_VM_KNOWN_HOSTS: /home/tunnel/.ssh/known_hosts
      ISOLATED_DOCKER_VM_IDENTITY_FILE: /home/tunnel/.ssh/id_ed25519
      ISOLATED_DOCKER_VM_LOCAL_SOCKET: /run/docker-labware/docker.sock
      ISOLATED_DOCKER_VM_REMOTE_SOCKET: /var/run/docker.sock
    volumes:
      - ${ISOLATED_DOCKER_VM_SSH_DIR:?Set ISOLATED_DOCKER_VM_SSH_DIR to a dedicated SSH directory for isolated-docker-vm-tunnel}:/home/tunnel/.ssh:ro
      - /run/docker-labware:/run/docker-labware
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail --unix-socket /run/docker-labware/docker.sock http://docker/_ping >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  docker-vm-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-vm-socket-proxy
    restart: unless-stopped
    networks:
      - docker-proxy
    depends_on:
      isolated-docker-vm-tunnel:
        condition: service_healthy
    volumes:
      - /run/docker-labware/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read-only permissions for inventory/inspection.
      CONTAINERS: 1    # List/inspect containers
      IMAGES: 1        # List/inspect images
      NETWORKS: 1      # List/inspect networks
      VOLUMES: 1       # List/inspect volumes
      LOGS: 1          # Allow container logs
      POST: 0          # Disallow create/start/stop/exec
      DELETE: 0        # Disallow removals
      INFO: 1          # Docker daemon info
      VERSION: 1       # Docker version

      # Restricted operations
      BUILD: 0         # Disable docker build
      SESSION: 0       # Disable buildx sessions
      COMMIT: 0        # Disable container commits
      EXEC: 0          # Disable container exec
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  docker-vm-controller-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-vm-controller-proxy
    restart: unless-stopped
    networks:
      - docker-controller
    depends_on:
      isolated-docker-vm-tunnel:
        condition: service_healthy
    volumes:
      - /run/docker-labware/docker.sock:/var/run/docker.sock:ro
    environment:
      # Mutating isolated-VM access for platform controllers only.
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      LOGS: 1
      POST: 1
      DELETE: 1
      INFO: 1
      VERSION: 1
      BUILD: 1
      SESSION: 1
      COMMIT: 0
      EXEC: 1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-socket-proxy
    restart: unless-stopped
    networks:
      - docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read-only permissions for monitoring services
      CONTAINERS: 1    # List/inspect containers
      IMAGES: 1        # List/inspect images
      NETWORKS: 1      # List/inspect networks
      VOLUMES: 1       # List/inspect volumes
      LOGS: 1          # Allow container logs
      POST: 0          # Disallow create/start/stop/exec
      DELETE: 0        # Disallow removals
      INFO: 1          # Docker daemon info
      VERSION: 1       # Docker version
      SERVICES: 1      # Docker Swarm services (if used)
      TASKS: 1         # Docker Swarm tasks (if used)

      # Restricted operations
      BUILD: 0         # Disable docker build
      COMMIT: 0        # Disable container commits
      EXEC: 0          # Disable container exec
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  docker-socket-controller-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-socket-controller-proxy
    restart: unless-stopped
    networks:
      - docker-controller
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Mutating host access for platform controllers only.
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      LOGS: 1
      POST: 1
      DELETE: 1
      INFO: 1
      VERSION: 1
      SERVICES: 1
      TASKS: 1
      BUILD: 0
      COMMIT: 0
      EXEC: 1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  docker-proxy:
    driver: bridge
  docker-controller:
    driver: bridge
