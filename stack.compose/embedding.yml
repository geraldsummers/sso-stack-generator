services:
  embedding-gpu:
    image: webservices/embedding-bge:local-build
    pull_policy: build
    build:
      context: ./stack.containers/embedding-bge
      dockerfile: Dockerfile
    container_name: embedding-gpu
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - ai
      - caddy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      RUST_LOG: warn
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      --model-id BAAI/bge-m3
      --dtype float32
      --port 8080
      --max-concurrent-requests ${EMBEDDING_GPU_MAX_CONCURRENT_REQUESTS:-32}
      --max-batch-tokens ${EMBEDDING_GPU_MAX_BATCH_TOKENS:-8192}
      --max-batch-requests ${EMBEDDING_GPU_MAX_BATCH_REQUESTS:-32}
      --max-client-batch-size ${EMBEDDING_GPU_MAX_CLIENT_BATCH_SIZE:-32}
      --pooling mean
    deploy:
      resources:
        limits:
          memory: ${EMBEDDING_GPU_MEMORY_LIMIT:-10G}
          cpus: '${EMBEDDING_GPU_CPU_LIMIT:-4.0}'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 300s
