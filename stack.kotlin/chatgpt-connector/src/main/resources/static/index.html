<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT Connector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #14b8a6;
      --accent: #f97316;
      --danger: #ef4444;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      min-height: 2.25rem;
      padding: 0.45rem 0.7rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--primary); }
    button.primary { background: var(--primary); border-color: var(--primary); color: #042f2e; font-weight: 700; }
    button.accent { background: var(--accent); border-color: var(--accent); color: #111827; font-weight: 700; }
    button.danger { border-color: var(--danger); color: #fecaca; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #020617;
      color: var(--text);
      min-height: 2.35rem;
      padding: 0.45rem 0.6rem;
    }
    label { display: grid; gap: 0.35rem; color: var(--muted); font-size: 0.85rem; }
    code {
      display: inline-block;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: #ccfbf1;
      padding: 0.15rem 0.35rem;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: #020617;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.2rem; }
    h2 { font-size: 1rem; }
    h3 { font-size: 0.95rem; }
    main {
      display: grid;
      grid-template-columns: minmax(18rem, 24rem) minmax(0, 1fr);
      gap: 1rem;
      padding: 1rem;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--line);
      background: rgba(31, 41, 55, 0.55);
    }
    .panel-body { padding: 1rem; }
    .stack { display: grid; gap: 0.85rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .muted { color: var(--muted); }
    .small { font-size: 0.82rem; }
    .scope-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.4rem;
    }
    .scope {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.45rem 0.55rem;
      color: var(--text);
      background: #020617;
    }
    .scope input { width: auto; min-height: 0; }
    .status {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.7rem;
      background: #020617;
      color: var(--muted);
      min-height: 2.7rem;
    }
    .status.error { border-color: var(--danger); color: #fecaca; }
    .status.ok { border-color: var(--ok); color: #bbf7d0; }
    .token-reveal {
      display: none;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.85rem;
      background: rgba(249, 115, 22, 0.08);
    }
    .token-reveal.visible { display: grid; gap: 0.65rem; }
    .account-list { display: grid; gap: 0.85rem; }
    .account {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #020617;
      overflow: hidden;
    }
    .account.closed { opacity: 0.62; }
    .account-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem;
      border-bottom: 1px solid var(--line);
    }
    .account-actions, .token-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill-row { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.15rem 0.45rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .token {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid rgba(51, 65, 85, 0.7);
    }
    .token:last-child { border-bottom: 0; }
    .token.revoked code, .token.expired code { color: var(--muted); }
    .audit-row {
      display: grid;
      grid-template-columns: minmax(8rem, 12rem) minmax(0, 1fr);
      gap: 0.75rem;
      border-bottom: 1px solid rgba(51, 65, 85, 0.7);
      padding: 0.65rem 0;
    }
    .audit-row:last-child { border-bottom: 0; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 1.25rem;
      text-align: center;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .grid-2, .token, .audit-row { grid-template-columns: 1fr; }
      .account-top { display: grid; }
      .account-actions, .token-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ChatGPT MCP Connector</h1>
      <p id="identity" class="muted small">Loading identity...</p>
    </div>
    <button id="refresh" type="button">Refresh</button>
  </header>

  <main>
    <section class="stack">
      <div class="panel">
        <div class="panel-header">
          <h2>Create Agent Account</h2>
        </div>
        <form id="account-form" class="panel-body stack">
          <label>
            Display name
            <input id="display-name" name="displayName" autocomplete="off" placeholder="ChatGPT connector" required />
          </label>
          <div class="stack">
            <p class="muted small">Account scopes</p>
            <div class="scope-grid" data-scope-group="account">
              <label class="scope"><input type="checkbox" value="search" checked /> search</label>
              <label class="scope"><input type="checkbox" value="fetch" checked /> fetch</label>
              <label class="scope"><input type="checkbox" value="pipeline_status" checked /> pipeline status</label>
              <label class="scope"><input type="checkbox" value="workspace_readiness" checked /> workspace readiness</label>
            </div>
          </div>
          <button class="primary" type="submit">Create Account</button>
        </form>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Mint Token</h2>
        </div>
        <form id="token-form" class="panel-body stack">
          <label>
            Account
            <input id="token-account" name="accountId" list="account-options" placeholder="Select an account below" required />
            <datalist id="account-options"></datalist>
          </label>
          <div class="grid-2">
            <label>
              TTL seconds
              <input id="ttl" name="ttlSeconds" type="number" min="60" max="2592000" value="86400" required />
            </label>
            <label>
              Endpoint
              <input id="mcp-endpoint" readonly />
            </label>
          </div>
          <div class="stack">
            <p class="muted small">Token scopes</p>
            <div class="scope-grid" data-scope-group="token">
              <label class="scope"><input type="checkbox" value="search" checked /> search</label>
              <label class="scope"><input type="checkbox" value="fetch" checked /> fetch</label>
              <label class="scope"><input type="checkbox" value="pipeline_status" checked /> pipeline status</label>
              <label class="scope"><input type="checkbox" value="workspace_readiness" checked /> workspace readiness</label>
            </div>
          </div>
          <button class="accent" type="submit">Mint Token</button>
        </form>
      </div>

      <div id="token-reveal" class="token-reveal">
        <h2>One-Time Token</h2>
        <p class="muted small">Copy this now. The full value is not stored or shown again.</p>
        <code id="new-token"></code>
        <div class="account-actions">
          <button id="copy-token" type="button">Copy Token</button>
          <button id="hide-token" type="button">Hide</button>
        </div>
      </div>

      <div id="status" class="status">Ready.</div>
    </section>

    <section class="stack">
      <div class="panel">
        <div class="panel-header">
          <h2>Accounts and Tokens</h2>
          <span id="account-count" class="muted small"></span>
        </div>
        <div id="accounts" class="panel-body account-list"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Audit Events</h2>
        </div>
        <div id="audit" class="panel-body"></div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('mcp-endpoint').value = `${window.location.origin}/mcp`;

    const state = { accounts: [] };
    const statusEl = document.getElementById('status');
    const accountsEl = document.getElementById('accounts');
    const auditEl = document.getElementById('audit');
    const tokenReveal = document.getElementById('token-reveal');
    const newTokenEl = document.getElementById('new-token');

    function setStatus(message, kind = '') {
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`.trim();
    }

    function scopesFor(group) {
      return [...document.querySelectorAll(`[data-scope-group="${group}"] input:checked`)].map((input) => input.value);
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          'content-type': 'application/json',
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      const payload = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(payload?.error || `${response.status} ${response.statusText}`);
      }
      return payload;
    }

    function formatDate(value) {
      if (!value) return 'never';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
    }

    function tokenState(token) {
      if (token.revokedAt) return 'revoked';
      if (new Date(token.expiresAt).getTime() <= Date.now()) return 'expired';
      return 'active';
    }

    function renderAccountOptions() {
      const options = document.getElementById('account-options');
      options.innerHTML = '';
      state.accounts
        .filter((entry) => !entry.account.closedAt)
        .forEach((entry) => {
          const option = document.createElement('option');
          option.value = entry.account.id;
          option.label = entry.account.displayName;
          options.append(option);
        });
    }

    function renderAccounts() {
      document.getElementById('account-count').textContent = `${state.accounts.length} total`;
      accountsEl.innerHTML = '';
      if (state.accounts.length === 0) {
        accountsEl.innerHTML = '<div class="empty">No agent accounts yet.</div>';
        renderAccountOptions();
        return;
      }

      state.accounts.forEach(({ account, tokens }) => {
        const article = document.createElement('article');
        article.className = `account ${account.closedAt ? 'closed' : ''}`.trim();
        article.innerHTML = `
          <div class="account-top">
            <div class="stack">
              <h3>${escapeHtml(account.displayName)}</h3>
              <p class="muted small">${escapeHtml(account.keycloakUsername || 'Keycloak user pending')} · ${account.closedAt ? 'closed' : 'active'}</p>
              <div class="pill-row">${account.scopes.map((scope) => `<span class="pill">${escapeHtml(scope)}</span>`).join('')}</div>
              <p class="muted small">Created ${formatDate(account.createdAt)}</p>
            </div>
            <div class="account-actions">
              <button type="button" data-action="select-account" data-account-id="${account.id}" ${account.closedAt ? 'disabled' : ''}>Use</button>
              <button class="danger" type="button" data-action="close-account" data-account-id="${account.id}" ${account.closedAt ? 'disabled' : ''}>Close</button>
            </div>
          </div>
          <div>${renderTokens(tokens)}</div>
        `;
        accountsEl.append(article);
      });
      renderAccountOptions();
    }

    function renderTokens(tokens) {
      if (!tokens.length) return '<div class="empty">No tokens minted for this account.</div>';
      return tokens.map((token) => {
        const stateName = tokenState(token);
        return `
          <div class="token ${stateName}">
            <div class="stack">
              <div><code>${escapeHtml(token.tokenPrefix)}...</code> <span class="pill">${stateName}</span></div>
              <div class="pill-row">${token.scopes.map((scope) => `<span class="pill">${escapeHtml(scope)}</span>`).join('')}</div>
              <p class="muted small">Expires ${formatDate(token.expiresAt)} · Last used ${formatDate(token.lastUsedAt)}</p>
            </div>
            <div class="token-actions">
              <button class="danger" type="button" data-action="revoke-token" data-token-id="${token.id}" ${stateName === 'revoked' ? 'disabled' : ''}>Revoke</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAudit(events) {
      auditEl.innerHTML = '';
      if (events.length === 0) {
        auditEl.innerHTML = '<div class="empty">No audit events yet.</div>';
        return;
      }
      events.forEach((event) => {
        const row = document.createElement('div');
        row.className = 'audit-row';
        row.innerHTML = `
          <div class="muted small">${formatDate(event.createdAt)}</div>
          <div>
            <strong>${escapeHtml(event.eventType)}</strong>
            <p class="muted small">${escapeHtml(event.detail)}</p>
          </div>
        `;
        auditEl.append(row);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function refresh() {
      try {
        setStatus('Refreshing...');
        const [me, accounts, audit] = await Promise.all([
          api('/api/me'),
          api('/api/agent-accounts'),
          api('/api/audit-events')
        ]);
        document.getElementById('identity').textContent = `${me.username}${me.email ? ` · ${me.email}` : ''}`;
        state.accounts = accounts;
        renderAccounts();
        renderAudit(audit);
        setStatus('Ready.', 'ok');
      } catch (error) {
        setStatus(error.message, 'error');
      }
    }

    document.getElementById('account-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        const displayName = document.getElementById('display-name').value.trim();
        const scopes = scopesFor('account');
        if (!displayName) throw new Error('Display name is required.');
        if (!scopes.length) throw new Error('Choose at least one account scope.');
        setStatus('Creating account...');
        const account = await api('/api/agent-accounts', {
          method: 'POST',
          body: JSON.stringify({ displayName, scopes })
        });
        document.getElementById('token-account').value = account.id;
        document.getElementById('display-name').value = '';
        await refresh();
        setStatus('Account created.', 'ok');
      } catch (error) {
        setStatus(error.message, 'error');
      }
    });

    document.getElementById('token-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        const accountId = document.getElementById('token-account').value.trim();
        const ttlSeconds = Number(document.getElementById('ttl').value);
        const scopes = scopesFor('token');
        if (!accountId) throw new Error('Account is required.');
        if (!scopes.length) throw new Error('Choose at least one token scope.');
        setStatus('Minting token...');
        const minted = await api(`/api/agent-accounts/${encodeURIComponent(accountId)}/tokens`, {
          method: 'POST',
          body: JSON.stringify({ scopes, ttlSeconds })
        });
        newTokenEl.textContent = minted.token;
        tokenReveal.classList.add('visible');
        await refresh();
        setStatus('Token minted. Copy the one-time token now.', 'ok');
      } catch (error) {
        setStatus(error.message, 'error');
      }
    });

    accountsEl.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const action = button.dataset.action;
      try {
        if (action === 'select-account') {
          document.getElementById('token-account').value = button.dataset.accountId;
          setStatus('Account selected.', 'ok');
        }
        if (action === 'revoke-token') {
          setStatus('Revoking token...');
          await api(`/api/tokens/${encodeURIComponent(button.dataset.tokenId)}/revoke`, { method: 'POST' });
          await refresh();
          setStatus('Token revoked.', 'ok');
        }
        if (action === 'close-account') {
          if (!confirm('Close this account and revoke all of its tokens?')) return;
          setStatus('Closing account...');
          await api(`/api/agent-accounts/${encodeURIComponent(button.dataset.accountId)}/close`, { method: 'POST' });
          await refresh();
          setStatus('Account closed.', 'ok');
        }
      } catch (error) {
        setStatus(error.message, 'error');
      }
    });

    document.getElementById('copy-token').addEventListener('click', async () => {
      await navigator.clipboard.writeText(newTokenEl.textContent);
      setStatus('Token copied.', 'ok');
    });

    document.getElementById('hide-token').addEventListener('click', () => {
      newTokenEl.textContent = '';
      tokenReveal.classList.remove('visible');
      setStatus('One-time token hidden.', 'ok');
    });

    document.getElementById('refresh').addEventListener('click', refresh);
    refresh();
  </script>
</body>
</html>
