<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Model Arbitration</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09121a;
      --panel: rgba(13, 23, 32, 0.92);
      --line: rgba(147, 201, 255, 0.16);
      --text: #f5fbff;
      --muted: #9bb1c8;
      --accent: #7bddff;
      --ok: #6fdfa9;
      --warn: #ffcf6f;
      --bad: #ff8f86;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(123, 221, 255, 0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(255, 207, 111, 0.12), transparent 28%),
        linear-gradient(180deg, #08131d, var(--bg));
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 18px 56px; }
    h1, h2 { margin: 0; }
    p, li, small { color: var(--muted); }
    .hero { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .grid { display: grid; gap: 14px; }
    .summary { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin: 22px 0; }
    .split { grid-template-columns: 1.25fr 1fr; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      backdrop-filter: blur(12px);
    }
    .value { font-size: 1.8rem; font-weight: 700; }
    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .ok { background: rgba(111, 223, 169, 0.16); color: var(--ok); }
    .warn { background: rgba(255, 207, 111, 0.16); color: var(--warn); }
    .bad { background: rgba(255, 143, 134, 0.16); color: var(--bad); }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 12px 10px; text-align: left; vertical-align: top; }
    th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    tr:last-child td { border-bottom: 0; }
    code { font-family: "IBM Plex Mono", monospace; }
    button {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
    }
    ul { margin: 0; padding-left: 18px; }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>Model Arbitration</h1>
        <p>Controls backlog-driven GPU ownership between bulk embedding throughput and interactive LLM serving.</p>
      </div>
      <div>
        <button onclick="reconcile()">Refresh Now</button>
        <button onclick="promote()">Prefer LLM Now</button>
      </div>
    </section>

    <section id="summary" class="grid summary"></section>

    <section class="grid split">
      <div class="panel">
        <h2>Backends</h2>
        <table>
          <thead>
            <tr>
              <th>Service</th>
              <th>Role</th>
              <th>State</th>
              <th>Health</th>
            </tr>
          </thead>
          <tbody id="backendRows"></tbody>
        </table>
      </div>

      <div class="panel">
        <h2>Priority Decision</h2>
        <div id="gate"></div>
      </div>
    </section>
  </main>

  <script>
    const badge = (ok, label) => `<span class="badge ${ok === true ? 'ok' : ok === false ? 'bad' : 'warn'}">${label}</span>`;

    async function load() {
      const status = await fetch('/api/status').then(r => r.json());
      document.getElementById('summary').innerHTML = [
        ['Mode', status.mode],
        ['Target Mode', status.decision.targetMode],
        ['LLM Target', status.llmTarget],
        ['Embedding Target', status.embeddingTarget],
        ['Ready', status.ready ? 'yes' : 'no'],
        ['Pending', status.decision.totalPendingEmbedding],
        ['In Progress', status.decision.totalInProgressEmbedding],
      ].map(([label, value]) => `<div class="panel"><div>${label}</div><div class="value">${value}</div></div>`).join('');

      document.getElementById('backendRows').innerHTML = status.backends.map(backend => `
        <tr>
          <td><strong>${backend.serviceName}</strong><br><small><code>${backend.containerName}</code></small></td>
          <td>${backend.role}/${backend.mode}</td>
          <td>${badge(backend.running, backend.state)}</td>
          <td>${badge(backend.healthy, backend.healthy ? 'healthy' : backend.error || 'not ready')}</td>
        </tr>`).join('');

      const reasons = status.decision.reasons.length
        ? `<ul>${status.decision.reasons.map(reason => `<li>${reason}</li>`).join('')}</ul>`
        : '<p>' + badge(status.decision.eligible, status.decision.eligible ? 'llm priority eligible' : 'embedding priority retained') + '</p>';

      document.getElementById('gate').innerHTML = `
        <p><strong>Persisted State</strong><br><code>${JSON.stringify(status.state)}</code></p>
        <p><strong>Readiness Endpoint</strong><br><code>${status.readinessUrl}</code></p>
        <p><strong>Decision</strong></p>
        ${reasons}
        <p><small>Last evaluated: ${status.lastEvaluatedAt || 'never'}</small></p>`;
    }

    async function reconcile() {
      await fetch('/api/actions/reconcile', { method: 'POST' });
      await load();
    }

    async function promote() {
      await fetch('/api/actions/promote', { method: 'POST' });
      await load();
    }

    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
