default_config:

http:
  ip_ban_enabled: false
  login_attempts_threshold: 20

recorder:
  db_url: !env_var HOMEASSISTANT_DB_URL
  auto_purge: true
  purge_keep_days: 30

history:

logbook:

homeassistant:
  auth_providers:
    - type: trusted_networks
      name: Keycloak

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
