name: Docs and Smoke

on:
  push:
    branches:
      - dev
      - stable
  pull_request:

jobs:
  docs-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required publication files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -f SECURITY.md
          test -f docs/project-overview.md
          test -f docs/quickstart.md
          test -f docs/testing.md

      - name: Check for private path leaks in public docs
        run: |
          ! grep -RInE '(/home/gerald|gerald@|latium\.local|datamancy\.net)' \
            README.md CONTRIBUTING.md SECURITY.md AGENTS.md docs global.settings \
            stack.config stack.compose scripts ops

      - name: Check shell syntax
        run: |
          find scripts ops stack.config -type f -name '*.sh' -print0 \
            | xargs -0 -r -n1 bash -n
