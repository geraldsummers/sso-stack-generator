name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - stable

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Check required publication files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -f SECURITY.md
          test -f docs/README.md
          test -f docs/project-overview.md
          test -f docs/evaluation-guide.md
          test -f docs/quickstart.md
          test -f docs/testing.md
          test -f docs/assets/platform-home.svg
          test -f docs/assets/trust-boundary.svg
          test -f docs/assets/systemd-orchestration.svg

      - name: Check for private path leaks in public files
        run: |
          ! git grep -nE '(/home/gerald|gerald@|latium\.local|datamancy\.net|labware\.local)' -- \
            README.md CONTRIBUTING.md SECURITY.md AGENTS.md docs scripts ops modules

      - name: Check shell syntax
        run: |
          git ls-files 'scripts/**/*.sh' 'ops/**/*.sh' 'stack.config/**/*.sh' \
            | xargs -r -n1 bash -n

      - name: Run ShellCheck
        run: |
          git ls-files 'scripts/**/*.sh' 'ops/**/*.sh' 'stack.config/**/*.sh' \
            | xargs -r shellcheck -S error -s bash

      - name: Run deploy-state guard checks
        run: ./scripts/test-deploy-state.sh

      - name: Run env-file security checks
        run: ./scripts/test-env-file-security.sh

      - name: Run documentation checks
        run: ./scripts/test-docs.sh

  generator-tests:
    name: Generator script tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run module runner checks
        run: ./scripts/test-module-runners.sh

      - name: Run external module checks
        run: ./scripts/test-external-modules.sh

      - name: Run pull-module checks
        run: ./scripts/test-pull-modules.sh

      - name: Run mount diagnostic checks
        run: ./scripts/test-mount-diagnostics.sh
