<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Trust boundary</title>
  <desc id="desc">Diagram showing users, edge proxy, identity provider, and internal services.</desc>
  <rect width="960" height="540" fill="#fbfbfc"/>
  <rect x="300" y="60" width="560" height="420" rx="8" fill="#eef6f0" stroke="#2f6f45" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="580" y="100" fill="#2f6f45" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Trusted Internal Boundary</text>
  <circle cx="135" cy="270" r="54" fill="#ffffff" stroke="#263447" stroke-width="3"/>
  <text x="135" y="278" fill="#263447" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">User</text>
  <rect x="340" y="210" width="160" height="120" rx="8" fill="#ffffff" stroke="#263447" stroke-width="3"/>
  <text x="420" y="264" fill="#263447" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Edge Proxy</text>
  <text x="420" y="292" fill="#263447" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">auth gates</text>
  <rect x="620" y="150" width="170" height="95" rx="8" fill="#ffffff" stroke="#263447" stroke-width="3"/>
  <text x="705" y="205" fill="#263447" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Keycloak</text>
  <rect x="620" y="310" width="170" height="95" rx="8" fill="#ffffff" stroke="#263447" stroke-width="3"/>
  <text x="705" y="365" fill="#263447" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Services</text>
  <g stroke="#263447" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M189 270 H335"/>
    <path d="M500 250 C560 205 570 198 615 198"/>
    <path d="M500 290 C560 335 570 358 615 358"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#263447"/>
    </marker>
  </defs>
</svg>
